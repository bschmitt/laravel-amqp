name: "CI/CD"
on:
  push:
  pull_request:

jobs:
  unit-tests:
    timeout-minutes: 10
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        include:
          - php: "8.1"
            laravel: "10.*"
          - php: "8.2"
            laravel: "10.*"
          - php: "8.2"
            laravel: "11.*"
          - php: "8.2"
            laravel: "12.*"
          - php: "8.3"
            laravel: "12.*"
          - php: "8.3"
            laravel: "13.*"
    name: ${{ matrix.os }} - PHP${{ matrix.php }} - Laravel${{ matrix.laravel }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Installing PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ matrix.os }}-PHP${{ matrix.php }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ matrix.os }}-PHP${{ matrix.php }}-composer-

      - name: Composer Install
        run: |
          composer require --dev --no-update \
            "illuminate/support:${{ matrix.laravel }}" \
            "illuminate/config:${{ matrix.laravel }}"
          composer update --prefer-dist --optimize-autoloader --no-progress --ansi --no-interaction

      - name: Unit Tests
        run: ./vendor/bin/phpunit
