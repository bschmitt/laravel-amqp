name: "CI/CD"
on:
  push:
  pull_request:

jobs:
  unit-tests:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Each include row = one job (do not mix top-level os + include-only php/laravel).
      matrix:
        include:
          - php: "7.4"
            laravel: "9.*"
          - php: "8.1"
            laravel: "10.*"
          - php: "8.2"
            laravel: "10.*"
          - php: "8.2"
            laravel: "11.*"
          - php: "8.2"
            laravel: "12.*"
          - php: "8.3"
            laravel: "12.*"
          - php: "8.3"
            laravel: "13.*"
          - php: "8.4"
            laravel: "12.*"
          - php: "8.4"
            laravel: "13.*"
          - php: "8.5"
            laravel: "13.*"
    name: PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Installing PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: sockets
          coverage: none

      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ubuntu-PHP${{ matrix.php }}-Laravel${{ matrix.laravel }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ubuntu-PHP${{ matrix.php }}-Laravel${{ matrix.laravel }}-composer-
            ubuntu-PHP${{ matrix.php }}-composer-

      - name: Composer Install
        run: |
          PLATFORM_PHP="$(bash scripts/ci-platform-php.sh "${{ matrix.php }}" "${{ matrix.laravel }}")"
          composer config platform.php "$PLATFORM_PHP"
          composer require --dev --no-update \
            "illuminate/support:${{ matrix.laravel }}" \
            "illuminate/config:${{ matrix.laravel }}"
          composer update --prefer-dist --optimize-autoloader --no-progress --ansi --no-interaction

      - name: Unit Tests
        run: ./vendor/bin/phpunit
